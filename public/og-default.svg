<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0.95"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(96,165,250,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow blobs -->
  <circle cx="200" cy="150" r="180" fill="#2563EB" fill-opacity="0.18"/>
  <circle cx="1000" cy="500" r="220" fill="#7C3AED" fill-opacity="0.18"/>

  <!-- Logo bars -->
  <g transform="translate(80, 80)">
    <rect x="0" y="36" width="14" height="20" rx="3" fill="#60A5FA"/>
    <rect x="20" y="22" width="14" height="34" rx="3" fill="#A78BFA"/>
    <rect x="40" y="8"  width="14" height="48" rx="3" fill="#34D399"/>
  </g>
  <text x="148" y="120" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">SaaSStatsHub</text>

  <!-- Live tag -->
  <g transform="translate(80, 170)">
    <rect width="140" height="32" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(96,165,250,0.4)"/>
    <circle cx="20" cy="16" r="4" fill="#34D399"/>
    <text x="36" y="21" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#A5F3FC" letter-spacing="2">DATA · LIVE</text>
  </g>

  <!-- Big headline -->
  <text x="80" y="320" font-family="Inter, sans-serif" font-size="74" font-weight="800" fill="url(#title)">SaaS Statistics</text>
  <text x="80" y="400" font-family="Inter, sans-serif" font-size="74" font-weight="800" fill="#FFFFFF">&amp; Market Data</text>

  <!-- Tagline -->
  <text x="80" y="465" font-family="JetBrains Mono, monospace" font-size="22" font-weight="500" fill="rgba(191,219,254,0.85)">Always cited. Always current.</text>

  <!-- Mini chart bottom-right -->
  <g transform="translate(820, 380)">
    <rect x="0"   y="40" width="32" height="80"  rx="6" fill="url(#bar)" opacity="0.7"/>
    <rect x="44"  y="20" width="32" height="100" rx="6" fill="url(#bar)" opacity="0.85"/>
    <rect x="88"  y="60" width="32" height="60"  rx="6" fill="url(#bar)" opacity="0.6"/>
    <rect x="132" y="0"  width="32" height="120" rx="6" fill="url(#bar)"/>
    <rect x="176" y="30" width="32" height="90"  rx="6" fill="url(#bar)" opacity="0.85"/>
    <rect x="220" y="50" width="32" height="70"  rx="6" fill="url(#bar)" opacity="0.7"/>
    <rect x="264" y="10" width="32" height="110" rx="6" fill="url(#bar)" opacity="0.95"/>
  </g>

  <!-- Footer URL -->
  <text x="80" y="585" font-family="JetBrains Mono, monospace" font-size="18" font-weight="600" fill="rgba(148,163,184,0.7)" letter-spacing="2">SAASSTATSHUB.COM</text>
</svg>
